nerdfont: true
mode: window
merge_strategy: rebase

# Sidebar: percentages are clamped to a 25-col floor, so an absolute width is
# the only way under 25. Fixed 20 cols on every display, portrait included.
sidebar:
  width: 20

# Default worktree layout: agent pane on top, small shell split below.
panes:
  - command: <agent>
    focus: true
  - split: horizontal
    size: 20

# Shared into every worktree. Projects opt in with "<global>" in their symlink list.
files:
  symlink:
    - .claude/settings.local.json
