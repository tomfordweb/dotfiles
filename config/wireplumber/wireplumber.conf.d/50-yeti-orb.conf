# Yeti Orb (Logitech 046d:0ad5) — force the standard mono input profile.
# The Orb enumerates on "pro-audio" by default, which COSMIC's sound UI
# does not list, so it looks "not recognized". This pins it to
# input:mono-fallback on every plug so it always shows as a selectable input.
monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.usb-Logitech_Yeti_Orb_2603GVE0A338-00" }
    ]
    actions = {
      update-props = {
        device.profile = "input:mono-fallback"
      }
    }
  }
  {
    # When plugged in, the Orb should win default-input over the quiet
    # S600 cam mic. High priority.session makes WirePlumber prefer it.
    matches = [
      { node.name = "alsa_input.usb-Logitech_Yeti_Orb_2603GVE0A338-00.mono-fallback" }
    ]
    actions = {
      update-props = {
        priority.session = 2000
      }
    }
  }
]
