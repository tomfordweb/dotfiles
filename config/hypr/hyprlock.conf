# cyberdream — lock screen. Palette vars from the generated colors.conf.
# Avatar ring uses ~/.face if present (missing file just hides the image).

source = colors.conf

# Fingerprint unlock (Synaptics 06cb:009a via python-validity, see
# nixos/hosts/t480/default.nix). Runs concurrently with the password field:
# touch the sensor to unlock, or just type — whichever. Without this block
# hyprlock demands the password field AND the finger; with it, either works.
auth {
    fingerprint {
        enabled = true
        ready_message = (or scan fingerprint)
        present_message = scanning fingerprint...
        retry_delay = 250
    }
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    contrast = 0.9
    color = $crust
}

# big clock (hyprlock has no gradients — mauve carries the accent)
label {
    monitor =
    text = $TIME
    font_size = 118
    font_family = JetBrainsMono Nerd Font ExtraBold
    color = $mauve
    shadow_passes = 3
    shadow_size = 8
    shadow_color = $mauveHalf
    position = 0, 260
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%a · %d %b %Y"
    font_size = 17
    font_family = JetBrainsMono Nerd Font
    color = $sky
    position = 0, 170
    halign = center
    valign = center
}

# avatar ring
image {
    monitor =
    path = ~/.face
    size = 84
    rounding = -1
    border_size = 3
    border_color = $mauve
    position = 0, 20
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = $text
    position = 0, -60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.3
    dots_center = true
    rounding = 28
    outer_color = $mauveHalf
    inner_color = $inputInner
    font_color = $text
    check_color = $cyan
    fail_color = $red
    placeholder_text = <span foreground="##6c7086">   enter password</span>
    fade_on_empty = false
    position = 0, -130
    halign = center
    valign = center
}
