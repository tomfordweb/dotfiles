# minerva — multi-monitor desktop (NVIDIA).
#
# Monitors on this machine can disconnect/reconnect at runtime;
# explicit monitor rules make Hyprland restore the same layout on
# every replug instead of auto-placing.
#
# Layout (origin top-left, pixels):
#   - DP-5 / DP-4: two Dell S2719DGF (2560x1440) stacked vertically on
#     the right, DP-5 on top, DP-4 directly below.
#   - HDMI-A-3: BOE 2560x1600 panel, portrait (transform 1 = 90° left),
#     flush to the left of the Dells. Its top edge sits 1/4 of the way
#     down DP-4 (DP-4 top y=1440, quarter = +360 -> y=1800).
#
# The Dells are 1440p, NOT 4K — do not put 3840x2160 back here (that was
# a stale mode that fell back to preferred and left a vertical gap).
# DP-5 runs 144Hz; DP-4 currently maxes at 60Hz (cable/port limited —
# a proper DP cable would unlock 144 there too).
#
# When DP-4/DP-5 drop away, Hyprland automatically migrates every
# workspace to the remaining monitor (HDMI-A-3) — it becomes the
# de-facto primary with no extra config. On reconnect the rules below
# put everything back in this exact orientation.
#
# NVIDIA driver/connector changes may renumber outputs — if the layout
# comes up scrambled, run `hyprctl monitors` and fix the names.
#
# monitor = NAME, RES@HZ, POSITION, SCALE [, transform, N]
# transform 1 = 90° (portrait, rotated left)

monitor = DP-5, 2560x1440@144, 1600x0, 1
monitor = DP-4, 2560x1440@60, 1600x1440, 1
monitor = HDMI-A-3, 2560x1600@60, 0x1800, 1, transform, 1

# Anything unmatched: auto-place at preferred res.
monitor = , preferred, auto, 1
