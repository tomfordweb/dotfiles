#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 6
    gaps_out = 13

    border_size = 2

    # signature cyberdream gradient (vars from colors.conf)
    col.active_border = $mauve $cyan 45deg
    col.inactive_border = $surfaceDim

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 14
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.95
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = $mauveGlow
        color_inactive = $shadowDim
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes

    # cyberdream curves + animations (override the defaults below)
    bezier = dream, 0.05, 0.9, 0.1, 1.0
    bezier = glow, 0.16, 1, 0.3, 1

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick

    # cyberdream overrides (later lines win)
    animation = windows,    1, 5,  dream, popin 88%
    animation = windowsOut, 1, 5,  dream, popin 88%
    animation = border,     1, 12, glow
    animation = fade,       1, 6,  dream
    animation = workspaces, 1, 5,  glow, slidefade 12%
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = $base
}

# XWayland (X11) apps — e.g. Bambu Studio — render blurry on fractionally
# scaled outputs (the HDMI-A-3 BOE panel runs scale 1.33) because Hyprland
# upscales their 1x buffer. force_zero_scaling makes them render at native
# pixels instead → crisp text. Tradeoff: on the 1.33 panel such apps appear
# ~25% smaller; native Wayland apps (ghostty, waybar) are unaffected, and on
# the scale-1 Dells this changes nothing.
xwayland {
    force_zero_scaling = false
}

# Bambu Studio — let the main window TILE, but float + center only its
# dialogs/popups so they never land off-screen. Bambu's blocking dialogs
# (login, setup wizard, confirmations, errors) are X11 modal windows; the
# main window never is — so match:modal cleanly selects just the popups.
# Class is BambuStudio for both the nix + AppImage builds.
windowrule {
    name = bambu-dialog-center
    match:class = ^(BambuStudio)$
    match:modal = true

    float = yes
    center = yes
}

# blur the bar, launcher and notifications (glass look);
# ignore_alpha = 0 keeps blur off fully-transparent pixels (was `ignorezero`)
layerrule {
    name = glass-waybar
    match:namespace = waybar

    blur = on
    ignore_alpha = 0
}

layerrule {
    name = glass-wofi
    match:namespace = wofi

    blur = on
    ignore_alpha = 0
}

layerrule {
    name = glass-notifications
    match:namespace = notifications

    blur = on
    ignore_alpha = 0
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    kb_options = ctrl:nocaps
    # kb_options = ctrl:nocaps,altwin:swap_alt_win # caps as ctrl
    repeat_delay = 300
    repeat_rate = 50

    numlock_by_default = true   # numpad types digits at login, not arrows

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace


device {
    name = ploopy-corporation-ploopy-adept-trackball-mouse
    sensitivity = -0.8
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Machine-local overrides, outside the repo so they never leak between
# machines. QEMU VMs drop `$mainMod = ALT` here (written by NixOS
# tmpfiles in the vmVariant) because the host WM swallows Super. Glob
# means a missing dir is silently skipped on real installs.
# NOTE: hypr-local (NOT hypr/local) — ~/.config/hypr is a symlink into
# the repo on home-manager hosts, so local files must live outside it.
source = ~/.config/hypr-local/*.conf

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit

# Screenshots (bin/screenshot: saves to ~/Pictures/Screenshots + clipboard)
bind = , Print, exec, screenshot region        # drag-select a region
bind = SHIFT, Print, exec, screenshot full      # all outputs
bind = $mainMod, Print, exec, screenshot active # focused monitor

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, W, exec, pkill waybar && hyprctl dispatch exec waybar
bind = $mainMod SHIFT, L, exec, hyprctl dispatch exit

# lock screen + control center widget
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod, C, exec, eww open-many --toggle cc-closer control-center


windowrule {
    # wofi launches with --normal-window (see $menu) so clicking outside
    # moves focus and wofi's close_on_focus_loss can close it.
    name = wofi-launcher
    match:class = ^(wofi)$

    float = yes
    center = yes
}
# whisper.cpp push-to-talk dictation. The macropad's two PTT keys emit
# XF86Launch5 / XF86Tools (verified with wev — the firmware sends these, NOT
# F13/F14 as an earlier flash intended; bind to what the hardware actually
# sends). HOLD to record, RELEASE to transcribe + type. Hyprland has native
# key-release (bindr), so no evdev daemon needed here (that's the COSMIC-only
# shim). Needs nixos/modules/whisper-dictate.nix applied (whisper-cli, wtype).
bind  = , XF86Launch5, exec, whisper-toggle start
bindr = , XF86Launch5, exec, whisper-toggle stop
bind  = , XF86Tools, exec, whisper-toggle start
bindr = , XF86Tools, exec, whisper-toggle stop


windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
  name = "Floating steam friends list"
  match:class = "steam"
  match:title = "Friends List"

  size = 1000 1000
  float = yes
  no_anim = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
