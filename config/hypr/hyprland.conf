# See https://wiki.hypr.land/Configuring/Monitors/


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = $terminal -e yazi
$browser = chromium
# --normal-window: as a layer-shell surface wofi holds an exclusive
# keyboard grab, so clicking outside never moves focus and
# close_on_focus_loss (config/wofi/config) can't fire. As a normal
# window it floats/centers via the wofi-launcher windowrule below.
$menu = wofi --show drun --normal-window

# Per-hostname config (monitor layout, workspace pinning) from
# configs/<hostname>.conf. bin/hypr-host-config maintains the gitignored
# symlink (or an empty placeholder on hosts with no per-host file) and
# reloads once when it changed. First launch on a brand-new machine logs
# a one-time "globbing found no match" — the script self-heals it.
exec-once = "$HOME/code/tomfordweb/dotfiles/bin/hypr-host-config"
source = custom-by-hostname.conf

# cyberdream palette vars ($mauve, $cyan, ...) — generated by bin/rice-build
# from rice/palette.json.
source = colors.conf

exec-once = waybar
exec-once = hypridle
exec-once = awww-daemon
exec-once = mako
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprwallpapers
# Sleep for a bit - hopefully everything was initialized. Then start the loop.
# loop wallpapers every x seconds
exec-once = sleep 5; hyprwallpapers_loop 300
# eww widgets: ghosted desktop calendar (control center is toggled from waybar)
exec-once = eww daemon && eww open calendar-ghost
exec-once = hyprctl dispatch workspace 1

