# Remap prefix from 'C-b' to 'C-a'
unbind C-b                  # remove bind for C-b
set-option -g prefix C-a    
bind-key C-a send-prefix

set -g default-terminal "tmux-256color"

# Automatically set window title (#W tracks the running process; a manual
# rename via prefix-, flips the per-window flag off so it sticks)
set-window-option -g automatic-rename on
set-option -g allow-rename off
set-option -g set-titles on

set-option -g history-limit 10000

setw -g mode-keys vi
# vi-style selection in copy mode: v select, C-v block, y yank to clipboard (OSC52)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
setw -g monitor-activity on
set -g mouse on

# allow OSC52 clipboard access
set -g allow-passthrough on
set -s set-clipboard on

# Claude tmux
set -s extended-keys on
set -as terminal-features "xterm*:extkeys"

# Start window and pane numbering from 1 for easier switching
set -g base-index 1
# set -g pane-base-index

bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# No delay for escape key press
set -sg escape-time 0


bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Switch between two most recently used windows.
bind Space last-window

bind ^ switch-client -l


# vim: set ft=tmux tw=0 nowrap

set -g status-interval 5

# nvim fix for "autoread may not work" : checkhealth
set-option -g focus-events on

# nvim - fix term gui colors
set-option -sa terminal-overrides ',screen-256color:RGB'

set -g @plugin 'tmux-plugins/tpm'

# mighty scroll
set -g @plugin 'noscript/tmux-mighty-scroll'
set -g @mighty-scroll-interval 3
set -g @mighty-scroll-by-line 'man less pager fzf'
set -g @mighty-scroll-pass-through 'vim nvim claude'
set -g @mighty-scroll-fallback-mode 'pass-through'
set -g @mighty-scroll-select-pane off

# Autoreload tmux conf
set-option -g @plugin 'b0o/tmux-autoreload'

# I can't remember shit bro.
set -g @plugin 'alexwforsythe/tmux-which-key'

# keyboard copy hints (C-a F) — workaround for ghostty 1.3.1 broken drag-select
set -g @plugin 'Morantron/tmux-fingers'

# theme — cyberdream, generated from rice/palette.json by bin/rice-build
# (replaces the old catppuccin plugin; after removing the plugin run
# ~/.tmux/plugins/tpm/bin/clean_plugins once and kill-server so stale
# plugin styles don't linger)
set -g status-right-length 100
set -g status-left-length 100
source-file ~/.config/tmux/theme.conf

run '~/.tmux/plugins/tpm/tpm'

# window modal picker (C-a w)
unbind w
#bind w display-popup -E -w 85% -h 22% -b rounded -S "fg=#6c7086,bg=#11111b" -T "#[fg=#cba6f7,bold] Windows #[fg=#6c7086,nobold]" "${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tmux-window-modal/scripts/window-picker.sh"

# workmux: q = dashboard popup, Q = session-scoped popup, g = sidebar toggle,
# t = persistent bottom dashboard tray (portrait monitor). NOTE: q shadows
# display-panes — still reachable via `C-a :display-panes`.
bind q display-popup -E -w 95% -h 90% -b rounded -S "fg=#6c7086,bg=#11111b" -T "#[fg=#cba6f7,bold] Workmux #[fg=#6c7086,nobold]" "workmux dashboard"
bind Q display-popup -E -w 95% -h 90% -b rounded -S "fg=#6c7086,bg=#11111b" -T "#[fg=#cba6f7,bold] Workmux (session) #[fg=#6c7086,nobold]" "workmux dashboard -s"
bind g run-shell "touch /tmp/wm-sidebar-keeper.pause; workmux sidebar"
bind t run-shell 'pane=$(tmux list-panes -s -F "##{pane_id} ##{pane_start_command}" | grep -F "workmux dashboard" | head -1 | cut -d" " -f1); if [ -n "$pane" ]; then tmux kill-pane -t "$pane"; else tmux split-window -v -l 15 "while :; do workmux dashboard -s || break; sleep 0.2; done"; fi'
# keep sidebar alive: daemon never respawns a killed sidebar pane, so repair
# whenever a pane dies and a window is missing its sidebar (wm-sidebar-keeper)
set-hook -g pane-exited 'run-shell -b "wm-sidebar-keeper"'
set-hook -g after-kill-pane 'run-shell -b "wm-sidebar-keeper"'

# Evaluate the SSH_CLIENT variable when we reconnect.
set-option -g update-environment "SSH_CLIENT"

