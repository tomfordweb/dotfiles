# GENERATED by bin/rice-build — edit rice/palette.json, not this file.
# cyberdream — tmux status line + colors (replaces the catppuccin plugin).
# Pill chips are built from nerd-font half-circle glyphs ( / ).

# status bar
set -g status-style "fg=#cdd6f4,bg=default"
set -g status-position bottom
set -g status-justify left

# left: session chip (cyan)
set -g status-left "#[fg=#22d3ee,bg=default]#[fg=#11111b,bg=#22d3ee,bold] #S #[fg=#22d3ee,bg=default] "

# windows: glass chips, current = mauve pill
set -g window-status-separator " "
set -g window-status-format "#[fg=#313244,bg=default]#[fg=#6c7086,bg=#313244]#I #W#[fg=#313244,bg=default]"
set -g window-status-current-format "#[fg=#cba6f7,bg=default]#[fg=#11111b,bg=#cba6f7,bold]#I #W#[fg=#cba6f7,bg=default]"
set -g window-status-activity-style "fg=#22d3ee"
set -g window-status-bell-style "fg=#f38ba8"

# right: date/time chip (mauve) + host chip (surface)
set -g status-right "#[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244] %a %d %b#[fg=#313244,bg=default] #[fg=#cba6f7,bg=default]#[fg=#11111b,bg=#cba6f7,bold] %H:%M #[fg=#cba6f7,bg=default] #[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244]#h#[fg=#313244,bg=default]"

# panes
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# messages / prompts
set -g message-style "fg=#cba6f7,bg=#11111b,bold"
set -g message-command-style "fg=#22d3ee,bg=#11111b"

# copy mode selection + search matches
set -g mode-style "fg=#11111b,bg=#cba6f7,bold"
set -g copy-mode-match-style "fg=#11111b,bg=#22d3ee"
set -g copy-mode-current-match-style "fg=#11111b,bg=#ff6ac1,bold"

# clock (prefix t)
set -g clock-mode-colour "#cba6f7"
